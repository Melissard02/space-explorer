<!-- apod.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer | NASA API Project</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/apod.css">
</head>
<body class="subpage">

<header id="hero">
    <div class="top-bar">
        <a href="index.html" class="site-title"><h1>Space Explorer</h1></a>
        <nav>
            <a href="apod.html">APOD</a>
            <a href="mars.html">Mars Rover</a>
            <a href="asteroid.html">Asteroids</a>
        </nav>
    </div>
    
    <div id="hero-media"></div>
    
</header>

<main>

    <section id="apod-single-date">
        <h2>Search APOD by Date</h2>

        <form id="single-date-form">
            <input type="date" id="apod-date">
            <button type="submit">Search</button>
        </form>
       

        <div id="date-apod"></div>
    </section>

    <section id="apod-range-section">
        <h2>Explore APOD by Date Range</h2>
        <p>Select a start and end date to explore past Astronomy Pictures of the Day.</p>

        <form class="range-form" id="range-form">

            <label for="start-date">Start Date</label>
            <input type="date" id="start-date">

            <label for="end-date">End Date</label>
            <input type="date" id="end-date">

            <button id="range-btn">Load APODs</button>

        </form>

        <div id="apod-range" class="card-container">
            <!-- APOD cards will appear here -->
        </div>
    </section>
</main>

<footer>
    <p>Powered by NASA APIs</p>
</footer>

<script type="module" src="/js/apodPage.js"></script>

</body>
</html>
