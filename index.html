<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer | NASA API Project</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="hero">
    <h1>Space Explorer</h1>
    <nav>
        <a href="#apod">APOD</a>
        <a href="#mars">Mars Rover</a>
        <a href="#search">Search</a>
    </nav>
    <div class="hero-content">
        <h1 id="apod-title">Loading...</h1>
        <p id="apod-description"></p>
        <button onclick="loadAPOD">Refresh</button>
    </div>
</header>

<main>

    <!-- APOD Section -->
    <section id="apod">
        <h2>Astronomy Picture of the Day</h2>

        <div class="card">
            <img id="apod-image" src="" alt="Space Image">
            <h3 id="apod-title">Title appears here</h3>
            <p id="apod-description">Description appears here</p>
        </div>

        <button onclick="loadAPOD()">Load APOD</button>
    </section>


    <!-- Mars Rover Section -->
    <section id="mars">
        <h2>Mars Rover Photos</h2>

        <div id="mars-container" class="card-container">
            <!-- Mars photos inserted here -->
        </div>

        <button onclick="loadMarsPhotos()">Load Mars Photos</button>
    </section>


    <!-- NASA Search Section -->
    <section id="search">
        <h2>Search NASA Images</h2>

        <input type="text" id="search-input" placeholder="Search for galaxies, planets, etc">
        <button onclick="searchNASA()">Search</button>

        <div id="search-results" class="card-container">
        </div>
    </section>

</main>

<footer>
    <p>Powered by NASA APIs</p>
</footer>

<script type="module" src="script.js"></script>

</body>
</html>
