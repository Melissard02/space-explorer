<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer | NASA API Project</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="hero">
    <div class="top-bar">
        <h1>Space Explorer</h1>
        <nav>
            <a href="#apod">APOD</a>
            <a href="#mars">Mars Rover</a>
            <a href="#search">Search</a>
        </nav>
    </div>
    
    <div id="hero-media"></div>
    <div class="hero-content">
        <h1 id="apod-title">Loading...</h1>
        <p id="apod-description"></p>
         <a href="https://apod.nasa.gov/apod/"><button>View Picture of the Day</button></a>
    </div>
</header>

<main>

    <!-- Mars Rover Section -->
    <section id="mars">
        <h2>Mars Rover Photos</h2>

        <button class="carousel-btn prev" id="prev-btn">&#10094;</button>

        <div class="carousel-track-container">
            <div id="mars-container" class="carousel-track"></div>
        </div>

        <button class="carousel-btn next" id="next-btn">&#10095;</button>

    </section>


    <!-- NASA Search Section -->
    <section id="search">
        <h2>Search NASA Images</h2>

        <input type="text" id="search-input" placeholder="Search for galaxies, planets, etc">
        <button onclick="searchNASA()">Search</button>

        <div id="search-results" class="card-container">
        </div>
    </section>

    <!-- OBJECTS NEAR EARTH SECTION -->
    <section id="near-earth">
        <h2>Objects Near Earth</h2>

        <div id="aster-container" class="card-container">
            <!-- Asteroids stuff inserted here -->
        </div>

        <button onclick="loadNearEarth()">Load Asteroids</button>
    </section>
</main>

<footer>
    <p>Powered by NASA APIs</p>
</footer>

<script type="module" src="script.js"></script>

</body>
</html>
